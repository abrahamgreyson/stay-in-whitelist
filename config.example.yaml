# 配置文件模板
# 请将此文件复制一份并命名为config.yaml

# 华为云
huawei:
  access_key: your_huawei_access_key
  secret_key: your_huawei_secret_key
  regions:
    - region: huawei_region_code(e.g cn-east-3)
      rules:
        - sg: your_huawei_security_group_id
          allow:
            - port: 80
              desc: http
            - port: 444
              desc: docs
            - port: 5542
              desc: haha
            - port: 33558
    - region: huawei_region_code(e.g cn-east-3)
      rules:
        - sg: your_another_huawei_security_group_id
          allow:
            - port: 7799
              desc: test
            - port: 11111
# 腾讯云
tencent:
  access_key: your_tencent_cloud_access_key
  secret_key: your_tencent_cloud_secret_key
  regions:
    - region: tencent_cloud_region_code(e.g ap-guangzhou)
      rules:
        - sg: your_tencent_security_group_id
          allow:
            - port: 80
              desc: http
            - port: 444
              desc: docs
            - port: 5542
              desc: haha
            - port: 33558

# ipinfo
# 请在 ipinfo.io 申请token
ipinfo:
  tokens:
    - token_a
    - token_b

# Optional: check interval in seconds (default: 600, minimum: 600)
# check_interval: 600

# Optional: security group rule description prefix (default: "from Wulihe")
# Change this for dev/prod isolation, e.g., "from Wulihe-dev" for development
# Note: changing prefix means existing rules with old prefix become orphaned and must be cleaned up manually
# rule_prefix: "from Wulihe"

# Optional: file paths (defaults to same directory as config.yaml)
# paths:
#   ip_cache: /var/lib/stay-in-whitelist/ip_cache.txt
#   log_file: /var/log/stay-in-whitelist/stay_in_whitelist.log

# Optional: timeout settings (defaults shown, most users don't need to change)
# timeouts:
#   ip_detection:
#     connect: 3
#     read: 5
#   cloud_api:
#     connect: 3
#     read: 10
