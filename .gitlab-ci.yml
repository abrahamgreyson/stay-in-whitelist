image: 'python:3.12-slim'

stages:
  - test

variables:
  SETUPTOOLS_SCM_PRETEND_VERSION: "0.0.0"

cache:
  paths:
    - .pip-cache/

test:
  stage: test
  script:
    - pip install --cache-dir .pip-cache/ -i https://pypi.tuna.tsinghua.edu.cn/simple/ --upgrade pip
    - pip install --cache-dir .pip-cache/ -i https://pypi.tuna.tsinghua.edu.cn/simple/ -e ".[dev]"
    - cp config.example.yaml config.yaml
    - pytest tests/ --cov=stay_in_whitelist --junitxml=report.xml --cov-report=xml --cov-report=term
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: report.xml
  coverage: '/TOTAL.*\s+(\d+%)$/'
